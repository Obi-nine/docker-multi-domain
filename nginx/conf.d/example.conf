# Example configuration for a subdomain
# Copy this file and modify for your service:
# cp example.conf myapp.yourdomain.com.conf

server {
    listen 443 ssl http2;
    server_name example.yourdomain.com;

    # SSL certificates (obtained via certbot)
    ssl_certificate /etc/nginx/ssl/live/example.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/example.yourdomain.com/privkey.pem;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to your Docker service
    # Replace 'service-name:port' with your actual service
    # Example: frontend:3000, backend:8000, homeassistant:8123
    location / {
        proxy_pass http://service-name:port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # WebSocket support (needed for real-time apps)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Optional: Serve static files directly
    # location /static/ {
    #     alias /var/www/static/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # Optional: API endpoint with different settings
    # location /api/ {
    #     proxy_pass http://backend:8000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     
    #     # Longer timeout for API calls
    #     proxy_read_timeout 300s;
    # }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

