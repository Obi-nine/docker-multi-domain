services:
  nginx:
    container_name: infrastructure-nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro        
      - ./nginx/ssl:/etc/letsencrypt:ro
      - ./nginx/logs:/var/log/nginx
      - certbot-webroot:/var/www/certbot:ro
    networks:
      - web
    depends_on:
      - certbot
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  certbot:
    container_name: infrastructure-certbot
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
      - ./certbot/logs:/var/log/letsencrypt
    networks:
      - web
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --no-random-sleep-on-renew; sleep 12h & wait $${!}; done;'"

networks:
  web:
    name: ${DOCKER_NETWORK_NAME:-infrastructure-web}
    driver: bridge

volumes:
  certbot-webroot:
